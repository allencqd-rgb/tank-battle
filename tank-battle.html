<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>坦克大战 - Battle City</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        #tankImage {
            display: none;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        
        #gameContainer {
            position: relative;
            box-shadow: 0 10px 50px rgba(0,0,0,0.5);
        }
        
        #gameCanvas {
            display: block;
            background: #000;
            border: 3px solid #444;
        }
        
        #uiOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        .ui-panel {
            position: absolute;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
        }
        
        #scorePanel {
            top: 10px;
            left: 10px;
        }
        
        #livesPanel {
            top: 10px;
            right: 10px;
        }
        
        #levelPanel {
            bottom: 10px;
            left: 10px;
        }
        
        #powerupPanel {
            bottom: 10px;
            right: 10px;
        }
        
        #startScreen, #gameOverScreen, #levelCompleteScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 100;
            pointer-events: all;
        }
        
        .tank-sprite {
            border-radius: 50%;
            overflow: hidden;
        }
        
        .screen-title {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 30px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.8);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .screen-subtitle {
            font-size: 20px;
            margin-bottom: 20px;
            color: #aaa;
        }
        
        .btn {
            padding: 15px 40px;
            font-size: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
            pointer-events: all;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.6);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .hidden {
            display: none !important;
        }
        
        .controls-info {
            margin-top: 30px;
            font-size: 14px;
            color: #888;
            text-align: center;
            line-height: 1.8;
        }
        
        .powerup-indicator {
            display: inline-block;
            width: 20px;
            height: 20px;
            margin: 0 5px;
            border-radius: 3px;
        }
    </style>
</head>

    <script>
        // 游戏主类
        class TankBattle {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.canvas.width = 800;
                this.canvas.height = 600;
                
                this.gridSize = 40;
                this.cols = 20;
                this.rows = 15;
                
                this.gameState = 'menu'; // menu, playing, paused, gameover, levelcomplete
                this.score = 0;
                this.lives = 10;
                this.level = 1;
                this.enemiesLeft = 0;
                
                this.player = null;
                this.enemies = [];
                this.bullets = [];
                this.walls = [];
                this.powerups = [];
                this.base = null;
                
                this.keys = {};
                this.lastTime = 0;
                this.powerupTimer = 0;
                this.currentPowerup = null;
                
                this.init();
            }
            
            init() {
                document.addEventListener('keydown', (e) => {
                    this.keys[e.key.toLowerCase()] = true;
                    if (e.key === ' ') e.preventDefault();
                });
                
                document.addEventListener('keyup', (e) => {
                    this.keys[e.key.toLowerCase()] = false;
                });
                
                // 生成坦克贴图（Canvas绘制）
                this.generateTankImages();
                
                this.setupLevel(this.level);
            }
            
            generateTankImages() {
                this.tankImages = {
                    player: {},
                    enemy: {}
                };
                
                const directions = ['up', 'right', 'down', 'left'];
                const canvas = document.createElement('canvas');
                canvas.width = 40;
                canvas.height = 40;
                const ctx = canvas.getContext('2d');
                
                // 使用内嵌Base64图片（避免跨域问题）
                const playerImg = new Image();
                const self = this;
                let imagesReady = 0;
                const totalImages = 4;
                
                playerImg.onload = function() {
                    const directions = ['up', 'right', 'down', 'left'];
                    const cv = document.createElement('canvas');
                    cv.width = 40; cv.height = 40;
                    const c = cv.getContext('2d');
                    
                    directions.forEach((dir, index) => {
                        c.clearRect(0, 0, 40, 40);
                        c.save();
                        c.translate(20, 20);
                        const rotations = { 'up': 0, 'right': Math.PI/2, 'down': Math.PI, 'left': -Math.PI/2 };
                        c.rotate(rotations[dir]);
                        c.beginPath();
                        c.arc(0, 0, 18, 0, Math.PI * 2);
                        c.clip();
                        c.drawImage(playerImg, -18, -18, 36, 36);
                        c.restore();
                        c.strokeStyle = '#4CAF50';
                        c.lineWidth = 2;
                        c.strokeRect(1, 1, 38, 38);
                        const url = cv.toDataURL();
                        const im = new Image();
                        im.src = url;
                        self.tankImages.player[index] = im;
                    });
                    console.log('玩家坦克贴图生成完成');
                };

            drawTankShape(ctx, bodyColor, turretColor, direction) {
                // 根据方向旋转画布
                ctx.save();
                ctx.translate(20, 20);
                const rotations = { 'up': 0, 'right': Math.PI/2, 'down': Math.PI, 'left': -Math.PI/2 };
                ctx.rotate(rotations[direction]);
                
                // 坦克主体
                ctx.fillStyle = bodyColor;
                ctx.fillRect(-20, -20, 40, 40);
                
                // 坦克履带
                ctx.fillStyle = '#333';
                ctx.fillRect(-22, -20, 4, 40);
                ctx.fillRect(18, -20, 4, 40);
                
                // 坦克炮塔
                ctx.fillStyle = turretColor;
                ctx.fillRect(-5, -20, 10, 15);
                
                ctx.restore();
            }
            
            setupLevel(levelNum) {
                this.enemies = [];
                this.bullets = [];
                this.walls = [];
                this.powerups = [];
                
                // 创建地图
                this.createMap(levelNum);
                
                // 创建玩家
                this.player = new Tank(2 * this.gridSize, 12 * this.gridSize, 'player', this.tankImages.player);
                this.player.lives = this.lives;
                
                // 创建基地
                this.base = new Base(9 * this.gridSize, 14 * this.gridSize);
                
                // 创建敌人
                const enemyCount = Math.min(1 + levelNum, 3);
                this.enemiesLeft = enemyCount;
                
                for (let i = 0; i < enemyCount; i++) {
                    const x = (i % 3) * this.gridSize + this.gridSize;
                    const y = this.gridSize; // 改为 gridSize，避免生成在边界墙上
                    const enemy = new Tank(x, y, 'enemy', this.tankImages.enemy);
                    enemy.speed = 1;
                    enemy.aiLevel = 0;
                    this.enemies.push(enemy);
                }
            }
            
            createMap(levelNum) {
                // 清空地图
                this.walls = [];
                
                // 边界墙
                for (let i = 0; i < this.cols; i++) {
                    this.walls.push(new Wall(i * this.gridSize, 0, 'steel'));
                    this.walls.push(new Wall(i * this.gridSize, (this.rows - 1) * this.gridSize, 'steel'));
                }
                for (let i = 0; i < this.rows; i++) {
                    this.walls.push(new Wall(0, i * this.gridSize, 'steel'));
                    this.walls.push(new Wall((this.cols - 1) * this.gridSize, i * this.gridSize, 'steel'));
                }
                
                // 根据关卡生成障碍
                const wallPatterns = [
                    // 关卡1: 简单砖墙
                    { brick: [[5,5], [6,5], [7,5], [8,5], [9,5], [10,5], [11,5], [5,6], [11,6]], steel: [] },
                    // 关卡2: 增加铁墙
                    { brick: [[5,5], [6,5], [7,5], [8,5], [9,5], [10,5], [11,5]], steel: [[6,8], [7,8], [8,8], [9,8], [10,8]] },
                    // 关卡3: 迷宫
                    { brick: [[4,4],[5,4],[6,4],[7,4],[8,4],[9,4],[10,4],[11,4],[12,4],
                              [4,5],[12,5],[4,6],[12,6],[4,7],[12,7],[4,8],[12,8],
                              [4,9],[5,9],[6,9],[7,9],[8,9],[9,9],[10,9],[11,9],[12,9]], steel: [] }
                ];
                
                const pattern = wallPatterns[Math.min(levelNum - 1, wallPatterns.length - 1)];
                
                pattern.brick.forEach(([col, row]) => {
                    this.walls.push(new Wall(col * this.gridSize, row * this.gridSize, 'brick'));
                });
                
                pattern.steel.forEach(([col, row]) => {
                    this.walls.push(new Wall(col * this.gridSize, row * this.gridSize, 'steel'));
                });
                
                // 保护基地的墙
                const basePositions = [[9,13], [10,13], [8,13], [9,12], [10,12]];
                basePositions.forEach(([col, row]) => {
                    if (!this.walls.some(w => w.x === col * this.gridSize && w.y === row * this.gridSize)) {
                        this.walls.push(new Wall(col * this.gridSize, row * this.gridSize, 'brick'));
                    }
                });
            }
            
            start() {
                document.getElementById('startScreen').classList.add('hidden');
                this.gameState = 'playing';
                this.lastTime = performance.now();
                this.gameLoop();
            }
            
            restart() {
                this.score = 0;
                this.lives = 10;
                this.level = 1;
                this.currentPowerup = null;
                this.powerupTimer = 0;
                this.setupLevel(this.level);
                this.start();
            }
            
            showStart() {
                document.getElementById('gameOverScreen').classList.add('hidden');
                document.getElementById('startScreen').classList.remove('hidden');
                this.gameState = 'menu';
            }
            
            showControls() {
                alert('操作说明:\n\nWASD / 方向键 - 移动坦克\n空格 / J - 射击\nP - 暂停游戏\n\n道具效果:\n⭐ - 提升射击等级\n🪖 - 无敌5秒\n💣 - 消灭所有敌人\n⏰ - 冻结敌人5秒\n🔫 - 额外生命');
            }
            
            gameLoop() {
                if (this.gameState !== 'playing') return;
                
                const currentTime = performance.now();
                const deltaTime = currentTime - this.lastTime;
                this.lastTime = currentTime;
                
                this.update(deltaTime);
                this.render();
                
                requestAnimationFrame(() => this.gameLoop());
            }
            
            update(deltaTime) {
                // 更新玩家
                this.handlePlayerInput();
                this.player.update(deltaTime, this.walls);
                
                // 更新敌人
                this.enemies = this.enemies.filter(enemy => {
                    if (enemy.active) {
                        enemy.updateAI(deltaTime, this.walls, this.player);
                        enemy.update(deltaTime, this.walls);
                        return true;
                    }
                    return false;
                });
                
                // 更新子弹
                this.bullets = this.bullets.filter(bullet => {
                    bullet.update(deltaTime);
                    
                    // 检查碰撞
                    if (this.checkBulletCollisions(bullet)) {
                        return false;
                    }
                    
                    // 超出边界
                    if (bullet.x < 0 || bullet.x > this.canvas.width || 
                        bullet.y < 0 || bullet.y > this.canvas.height) {
                        return false;
                    }
                    
                    return true;
                });
                
                // 更新道具
                this.powerups = this.powerups.filter(powerup => {
                    powerup.update(deltaTime);
                    
                    // 检查玩家是否拾取
                    if (this.checkPowerupCollision(powerup)) {
                        this.applyPowerup(powerup.type);
                        return false;
                    }
                    
                    return powerup.active;
                });
                
                // 随机生成道具
                if (Math.random() < 0.001) {
                    this.spawnPowerup();
                }
                
                // 更新道具计时器
                if (this.currentPowerup && this.powerupTimer > 0) {
                    this.powerupTimer -= deltaTime;
                    if (this.powerupTimer <= 0) {
                        this.currentPowerup = null;
                        this.player.powerupLevel = 0;
                        this.player.invincible = false;
                    }
                }
                
                // 检查关卡完成
                if (this.enemies.length === 0 && this.enemiesLeft === 0) {
                    this.levelComplete();
                }
                
                // 更新UI
                this.updateUI();
            }
            
            handlePlayerInput() {
                if (!this.player.active) return;
                
                let dx = 0, dy = 0;
                
                if (this.keys['w'] || this.keys['arrowup']) {
                    dy = -1;
                    this.player.direction = 0;
                } else if (this.keys['s'] || this.keys['arrowdown']) {
                    dy = 1;
                    this.player.direction = 2;
                } else if (this.keys['a'] || this.keys['arrowleft']) {
                    dx = -1;
                    this.player.direction = 3;
                } else if (this.keys['d'] || this.keys['arrowright']) {
                    dx = 1;
                    this.player.direction = 1;
                }
                
                this.player.setMovement(dx, dy);
                
                // 射击
                if (this.keys[' '] || this.keys['j']) {
                    this.player.shoot(this.bullets);
                }
            }
            
            checkBulletCollisions(bullet) {
                // 检查与墙的碰撞
                for (let i = this.walls.length - 1; i >= 0; i--) {
                    const wall = this.walls[i];
                    if (this.checkCollision(bullet, wall)) {
                        if (wall.type === 'brick') {
                            this.walls.splice(i, 1);
                        }
                        return true;
                    }
                }
                
                // 检查与坦克的碰撞
                if (bullet.owner === 'player') {
                    for (let enemy of this.enemies) {
                        if (enemy.active && this.checkCollision(bullet, enemy)) {
                            enemy.takeDamage();
                            if (!enemy.active) {
                                this.score += 100;
                                this.enemiesLeft--;
                            }
                            return true;
                        }
                    }
                } else if (bullet.owner === 'enemy') {
                    if (this.player.active && this.checkCollision(bullet, this.player)) {
                        if (!this.player.invincible) {
                            this.player.takeDamage();
                            if (!this.player.active) {
                                this.lives--;
                                if (this.lives > 0) {
                                    this.respawnPlayer();
                                } else {
                                    this.gameOver();
                                }
                            }
                        }
                        return true;
                    }
                }
                
                // 检查与基地的碰撞
                if (this.checkCollision(bullet, this.base)) {
                    this.base.takeDamage();
                    if (!this.base.active) {
                        this.gameOver();
                    }
                    return true;
                }
                
                // 检查子弹之间的碰撞
                for (let otherBullet of this.bullets) {
                    if (otherBullet !== bullet && this.checkCollision(bullet, otherBullet)) {
                        return true;
                    }
                }
                
                return false;
            }
            
            checkCollision(obj1, obj2) {
                return obj1.x < obj2.x + obj2.width &&
                       obj1.x + obj1.width > obj2.x &&
                       obj1.y < obj2.y + obj2.height &&
                       obj1.y + obj1.height > obj2.y;
            }
            
            checkPowerupCollision(powerup) {
                return this.checkCollision(this.player, powerup);
            }
            
            spawnPowerup() {
                const types = ['star', 'helmet', 'bomb', 'clock', 'gun'];
                const type = types[Math.floor(Math.random() * types.length)];
                const x = Math.floor(Math.random() * (this.cols - 2) + 1) * this.gridSize;
                const y = Math.floor(Math.random() * (this.rows - 2) + 1) * this.gridSize;
                this.powerups.push(new Powerup(x, y, type));
            }
            
            applyPowerup(type) {
                switch(type) {
                    case 'star':
                        this.player.powerupLevel = Math.min(this.player.powerupLevel + 1, 3);
                        this.currentPowerup = 'star';
                        this.powerupTimer = 10000;
                        break;
                    case 'helmet':
                        this.player.invincible = true;
                        this.currentPowerup = 'helmet';
                        this.powerupTimer = 5000;
                        break;
                    case 'bomb':
                        this.enemies.forEach(enemy => {
                            enemy.takeDamage();
                            if (!enemy.active) {
                                this.score += 100;
                                this.enemiesLeft--;
                            }
                        });
                        break;
                    case 'clock':
                        this.enemies.forEach(enemy => {
                            enemy.frozen = true;
                            setTimeout(() => enemy.frozen = false, 5000);
                        });
                        break;
                    case 'gun':
                        this.lives = Math.min(this.lives + 1, 5);
                        break;
                }
            }
            
            respawnPlayer() {
                this.player = new Tank(2 * this.gridSize, 12 * this.gridSize, 'player');
                this.player.lives = this.lives;
            }
            
            levelComplete() {
                this.gameState = 'levelcomplete';
                document.getElementById('levelCompleteScreen').classList.remove('hidden');
                
                setTimeout(() => {
                    this.level++;
                    this.setupLevel(this.level);
                    document.getElementById('levelCompleteScreen').classList.add('hidden');
                    this.gameState = 'playing';
                    this.lastTime = performance.now();
                    this.gameLoop();
                }, 2000);
            }
            
            gameOver() {
                this.gameState = 'gameover';
                document.getElementById('finalScore').textContent = this.score;
                document.getElementById('gameOverScreen').classList.remove('hidden');
            }
            
            updateUI() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('enemiesLeft').textContent = this.enemiesLeft;
                document.getElementById('lives').textContent = this.lives >= 10 ? '❤️❤️❤️∞' : '❤️'.repeat(this.lives);
                document.getElementById('level').textContent = this.level;
                
                if (this.currentPowerup) {
                    const powerupNames = {
                        'star': '⭐ 射击强化',
                        'helmet': '🪖 无敌',
                        'bomb': '💣 炸弹',
                        'clock': '⏰ 冻结',
                        'gun': '🔫 额外生命'
                    };
                    document.getElementById('powerupStatus').textContent = 
                        powerupNames[this.currentPowerup] + ` (${(this.powerupTimer / 1000).toFixed(1)}s)`;
                } else {
                    document.getElementById('powerupStatus').textContent = '无';
                }
            }
            
            render() {
                // 清空画布
                this.ctx.fillStyle = '#000';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // 绘制网格（调试用）
                // this.drawGrid();
                
                // 绘制墙
                this.walls.forEach(wall => wall.render(this.ctx));
                
                // 绘制基地
                this.base.render(this.ctx);
                
                // 绘制道具
                this.powerups.forEach(powerup => powerup.render(this.ctx));
                
                // 绘制敌人
                this.enemies.forEach(enemy => enemy.render(this.ctx));
                
                // 绘制玩家
                if (this.player.active) {
                    this.player.render(this.ctx);
                }
                
                // 绘制子弹
                this.bullets.forEach(bullet => bullet.render(this.ctx));
                
                // 绘制UI
                this.renderUI();
            }
            
            drawGrid() {
                this.ctx.strokeStyle = '#333';
                this.ctx.lineWidth = 0.5;
                for (let i = 0; i <= this.cols; i++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(i * this.gridSize, 0);
                    this.ctx.lineTo(i * this.gridSize, this.canvas.height);
                    this.ctx.stroke();
                }
                for (let i = 0; i <= this.rows; i++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, i * this.gridSize);
                    this.ctx.lineTo(this.canvas.width, i * this.gridSize);
                    this.ctx.stroke();
                }
            }
            
            renderUI() {
                // 可以在这里添加额外的UI绘制
            }
        }
        
        // 坦克类
        class Tank {
            constructor(x, y, type, images = null) {
                this.x = x;
                this.y = y;
                this.width = 40;
                this.height = 40;
                this.type = type;
                this.direction = type === 'player' ? 0 : 2; // 0:上, 1:右, 2:下, 3:左
                this.speed = 2;
                this.active = true;
                this.lives = type === 'player' ? 3 : 1;
                this.shootCooldown = 0;
                this.powerupLevel = 0;
                this.invincible = false;
                this.frozen = false;
                
                // 移动相关
                this.dx = 0;
                this.dy = 0;
                
                // 贴图
                this.images = images; // 包含不同方向的贴图
            }
            
            setMovement(dx, dy) {
                this.dx = dx;
                this.dy = dy;
            }
            
            update(deltaTime, walls) {
                if (!this.active || this.frozen) return;
                
                // 更新射击冷却
                if (this.shootCooldown > 0) {
                    this.shootCooldown -= deltaTime;
                }
                
                // 移动
                let newX = this.x + this.dx * this.speed;
                let newY = this.y + this.dy * this.speed;
                
                // 检查碰撞
                const testTank = {
                    x: newX,
                    y: newY,
                    width: this.width,
                    height: this.height
                };
                
                let canMove = true;
                for (let wall of walls) {
                    if (this.checkCollision(testTank, wall)) {
                        canMove = false;
                        break;
                    }
                }
                
                if (canMove) {
                    this.x = newX;
                    this.y = newY;
                }
            }
            
            updateAI(deltaTime, walls, player) {
                if (!this.active || this.frozen) return;
                
                // 简单的AI: 随机移动 + 偶尔转向玩家
                if (Math.random() < 0.02) {
                    const directions = [[0,-1], [1,0], [0,1], [-1,0]];
                    const dir = directions[Math.floor(Math.random() * 4)];
                    this.dx = dir[0];
                    this.dy = dir[1];
                    
                    // 更新方向
                    if (dir[0] === 0 && dir[1] === -1) this.direction = 0;
                    else if (dir[0] === 1 && dir[1] === 0) this.direction = 1;
                    else if (dir[0] === 0 && dir[1] === 1) this.direction = 2;
                    else if (dir[0] === -1 && dir[1] === 0) this.direction = 3;
                }
                
                // 偶尔射击
                if (Math.random() < 0.01) {
                    this.shoot(game.bullets);
                }
                
                // 根据AI等级增加追踪玩家的概率
                if (Math.random() < 0.005) {
                    const dx = player.x - this.x;
                    const dy = player.y - this.y;
                    
                    if (Math.abs(dx) > Math.abs(dy)) {
                        this.dx = dx > 0 ? 1 : -1;
                        this.dy = 0;
                        this.direction = dx > 0 ? 1 : 3;
                    } else {
                        this.dx = 0;
                        this.dy = dy > 0 ? 1 : -1;
                        this.direction = dy > 0 ? 2 : 0;
                    }
                }
            }
            
            shoot(bullets) {
                if (this.shootCooldown <= 0) {
                    const bulletX = this.x + this.width / 2 - 4;
                    const bulletY = this.y + this.height / 2 - 4;
                    
                    let dx = 0, dy = 0;
                    switch(this.direction) {
                        case 0: dy = -1; break;
                        case 1: dx = 1; break;
                        case 2: dy = 1; break;
                        case 3: dx = -1; break;
                    }
                    
                    const bulletSpeed = 7 + this.powerupLevel * 2;
                    bullets.push(new Bullet(bulletX, bulletY, dx, dy, bulletSpeed, this.type));
                    
                    this.shootCooldown = 500 - this.powerupLevel * 100;
                }
            }
            
            takeDamage() {
                this.lives--;
                if (this.lives <= 0) {
                    this.active = false;
                }
            }
            
            checkCollision(obj1, obj2) {
                return obj1.x < obj2.x + obj2.width &&
                       obj1.x + obj1.width > obj2.x &&
                       obj1.y < obj2.y + obj2.height &&
                       obj1.y + obj1.height > obj2.y;
            }
            
            render(ctx) {
                if (!this.active) return;
                
                // 尝试使用贴图渲染
                if (this.images && this.images[this.direction]) {
                    const img = this.images[this.direction];
                    // 检查图片是否已加载成功
                    if (img.complete && img.naturalWidth > 0) {
                        ctx.drawImage(img, this.x, this.y, this.width, this.height);
                        
                        // 无敌效果（贴图模式）
                        if (this.invincible) {
                            ctx.strokeStyle = '#FFD700';
                            ctx.lineWidth = 3;
                            ctx.setLineDash([5, 5]);
                            ctx.beginPath();
                            ctx.arc(this.x + this.width / 2, this.y + this.height / 2, this.width / 2 + 5, 0, Math.PI * 2);
                            ctx.stroke();
                            ctx.setLineDash([]);
                        }
                        return;
                    }
                }
                
                // 回退到几何图形渲染
                ctx.save();
                ctx.translate(this.x + this.width / 2, this.y + this.height / 2);
                ctx.rotate(this.direction * Math.PI / 2);
                
                // 坦克主体
                ctx.fillStyle = this.type === 'player' ? '#4CAF50' : '#F44336';
                ctx.fillRect(-this.width / 2, -this.height / 2, this.width, this.height);
                
                // 坦克履带
                ctx.fillStyle = '#333';
                ctx.fillRect(-this.width / 2 - 2, -this.height / 2, 4, this.height);
                ctx.fillRect(this.width / 2 - 2, -this.height / 2, 4, this.height);
                
                // 坦克炮塔
                ctx.fillStyle = this.type === 'player' ? '#2E7D32' : '#C62828';
                ctx.fillRect(-5, -this.height / 2, 10, 15);
                
                // 无敌效果
                if (this.invincible) {
                    ctx.strokeStyle = '#FFD700';
                    ctx.lineWidth = 3;
                    ctx.setLineDash([5, 5]);
                    ctx.beginPath();
                    ctx.arc(0, 0, this.width / 2 + 5, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }
                
                ctx.restore();
            }
        }
        
        // 子弹类
        class Bullet {
            constructor(x, y, dx, dy, speed, owner) {
                this.x = x;
                this.y = y;
                this.width = 8;
                this.height = 8;
                this.dx = dx;
                this.dy = dy;
                this.speed = speed;
                this.owner = owner;
                this.active = true;
            }
            
            update(deltaTime) {
                this.x += this.dx * this.speed;
                this.y += this.dy * this.speed;
            }
            
            render(ctx) {
                ctx.fillStyle = this.owner === 'player' ? '#FFD700' : '#FFF';
                ctx.beginPath();
                ctx.arc(this.x + this.width / 2, this.y + this.height / 2, 4, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        // 墙类
        class Wall {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.width = 40;
                this.height = 40;
                this.type = type; // 'brick' or 'steel'
                this.active = true;
            }
            
            render(ctx) {
                if (this.type === 'brick') {
                    ctx.fillStyle = '#8B4513';
                    ctx.fillRect(this.x, this.y, this.width, this.height);
                    ctx.strokeStyle = '#654321';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(this.x, this.y, this.width, this.height);
                    
                    // 砖纹
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y + this.height / 2);
                    ctx.lineTo(this.x + this.width, this.y + this.height / 2);
                    ctx.moveTo(this.x + this.width / 2, this.y);
                    ctx.lineTo(this.x + this.width / 2, this.y + this.height / 2);
                    ctx.moveTo(this.x + this.width / 4, this.y + this.height / 2);
                    ctx.lineTo(this.x + this.width / 4, this.y + this.height);
                    ctx.moveTo(this.x + this.width * 3/4, this.y + this.height / 2);
                    ctx.lineTo(this.x + this.width * 3/4, this.y + this.height);
                    ctx.stroke();
                } else {
                    ctx.fillStyle = '#808080';
                    ctx.fillRect(this.x, this.y, this.width, this.height);
                    ctx.strokeStyle = '#444';
                    ctx.lineWidth = 3;
                    ctx.strokeRect(this.x + 2, this.y + 2, this.width - 4, this.height - 4);
                    
                    // 金属光泽
                    ctx.fillStyle = '#AAA';
                    ctx.fillRect(this.x + 5, this.y + 5, 10, 10);
                    ctx.fillRect(this.x + 25, this.y + 25, 10, 10);
                }
            }
        }
        
        // 基地类
        class Base {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 40;
                this.height = 40;
                this.active = true;
                this.lives = 1;
            }
            
            takeDamage() {
                this.lives--;
                if (this.lives <= 0) {
                    this.active = false;
                }
            }
            
            render(ctx) {
                if (!this.active) {
                    ctx.fillStyle = '#000';
                    ctx.fillRect(this.x, this.y, this.width, this.height);
                    return;
                }
                
                // 绘制旗帜
                ctx.fillStyle = '#FF0000';
                ctx.fillRect(this.x + 15, this.y + 5, 10, 30);
                
                // 旗杆
                ctx.strokeStyle = '#8B4513';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(this.x + 20, this.y + 5);
                ctx.lineTo(this.x + 20, this.y + 35);
                ctx.stroke();
                
                // 旗帜
                ctx.fillStyle = '#FF0000';
                ctx.beginPath();
                ctx.moveTo(this.x + 20, this.y + 5);
                ctx.lineTo(this.x + 35, this.y + 12);
                ctx.lineTo(this.x + 20, this.y + 19);
                ctx.fill();
            }
        }
        
        // 道具类
        class Powerup {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.width = 30;
                this.height = 30;
                this.type = type;
                this.active = true;
                this.spawnTime = performance.now();
                this.lifetime = 10000; // 10秒后消失
            }
            
            update(deltaTime) {
                if (performance.now() - this.spawnTime > this.lifetime) {
                    this.active = false;
                }
            }
            
            render(ctx) {
                const alpha = 0.5 + 0.5 * Math.sin(performance.now() / 200);
                ctx.save();
                ctx.globalAlpha = alpha;
                
                ctx.fillStyle = '#FFF';
                ctx.fillRect(this.x, this.y, this.width, this.height);
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                ctx.strokeRect(this.x, this.y, this.width, this.height);
                
                ctx.font = '20px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                const symbols = {
                    'star': '⭐',
                    'helmet': '🪖',
                    'bomb': '💣',
                    'clock': '⏰',
                    'gun': '🔫'
                };
                
                ctx.fillText(symbols[this.type], this.x + this.width / 2, this.y + this.height / 2);
                
                ctx.restore();
            }
        }
        
        // 初始化游戏
        const game = new TankBattle();
    </script>
